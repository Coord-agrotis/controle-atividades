<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Atividades</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>📋 Controle de Atividades</h1>
      <nav>
        <button class="tab-btn active" data-tab="atividades">Atividades</button>
        <button class="tab-btn" data-tab="consultores">Consultores</button>
      </nav>
    </div>
  </header>

  <!-- ── ABA ATIVIDADES ─────────────────────────────── -->
  <main id="tab-atividades" class="tab-content active">
    <div class="toolbar">
      <div class="toolbar-left">
        <label>Data:
          <input type="date" id="filtroData">
        </label>
        <label>Consultor:
          <select id="filtroConsultor">
            <option value="">Todos</option>
          </select>
        </label>
        <label>Status:
          <select id="filtroStatus">
            <option value="">Todos</option>
            <option value="pendente">Pendente</option>
            <option value="concluida">Concluída</option>
          </select>
        </label>
      </div>
      <button class="btn btn-primary" onclick="abrirModalAtividade()">+ Nova Atividade</button>
    </div>

    <div id="rolloverBanner" class="banner hidden">
      ⚠️ Atividades pendentes de dias anteriores foram movidas para hoje automaticamente.
      <button onclick="fecharBanner()">✕</button>
    </div>

    <div id="listaAtividades" class="cards-grid"></div>
  </main>

  <!-- ── ABA CONSULTORES ────────────────────────────── -->
  <main id="tab-consultores" class="tab-content">
    <div class="toolbar">
      <div class="toolbar-left"></div>
      <button class="btn btn-primary" onclick="abrirModalConsultor()">+ Novo Consultor</button>
    </div>
    <div id="listaConsultores" class="table-wrap">
      <table>
        <thead><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th></th></tr></thead>
        <tbody id="tBodyConsultores"></tbody>
      </table>
    </div>
  </main>

  <!-- ── MODAL ATIVIDADE ────────────────────────────── -->
  <div id="modalAtividade" class="modal hidden">
    <div class="modal-box">
      <h2 id="modalAtividadeTitulo">Nova Atividade</h2>
      <form id="formAtividade">
        <input type="hidden" id="atividadeId">
        <label>Título *<input type="text" id="atividadeTitulo" required></label>
        <label>Descrição<textarea id="atividadeDescricao" rows="3"></textarea></label>
        <div class="form-row">
          <label>Data *<input type="date" id="atividadeData" required></label>
          <label>Prioridade
            <select id="atividadePrioridade">
              <option value="baixa">Baixa</option>
              <option value="normal" selected>Normal</option>
              <option value="alta">Alta</option>
            </select>
          </label>
        </div>
        <label>Responsável
          <select id="atividadeConsultor">
            <option value="">— Sem responsável —</option>
          </select>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="fecharModalAtividade()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── MODAL CONSULTOR ────────────────────────────── -->
  <div id="modalConsultor" class="modal hidden">
    <div class="modal-box">
      <h2 id="modalConsultorTitulo">Novo Consultor</h2>
      <form id="formConsultor">
        <input type="hidden" id="consultorId">
        <label>Nome *<input type="text" id="consultorNome" required></label>
        <label>E-mail<input type="email" id="consultorEmail"></label>
        <label>Telefone<input type="tel" id="consultorTelefone"></label>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="fecharModalConsultor()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="overlay" class="overlay hidden" onclick="fecharTodosModais()"></div>

  <script src="app.js"></script>
</body>
</html>
