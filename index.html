<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Atividades</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #2e7d32; --green-light: #4caf50; --green-bg: #e8f5e9;
      --red: #c62828; --blue: #1565c0; --blue-light: #90caf9; --blue-bg: #e3f2fd;
      --purple: #6a1b9a; --purple-bg: #f3e5f5;
      --gray: #6b7280; --gray-light: #f3f4f6; --border: #e0e0e0;
      --white: #ffffff; --shadow: 0 1px 4px rgba(0,0,0,.1); --radius: 8px;
    }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f0; color: #1a1a1a; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--green); color: #fff; padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,.25); }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    nav { display: flex; gap: 4px; }
    .tab-btn { background: transparent; border: none; color: rgba(255,255,255,.75); padding: 8px 14px; border-radius: var(--radius); cursor: pointer; font-size: .88rem; font-weight: 500; transition: background .15s, color .15s; }
    .tab-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
    .tab-btn.active { background: rgba(255,255,255,.2); color: #fff; }

    /* ── Layout ── */
    .tab-content { display: none; max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .tab-content.active { display: block; }
    .hidden { display: none !important; }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .toolbar-left { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .toolbar label { display: flex; flex-direction: column; font-size: .75rem; font-weight: 600; color: var(--gray); gap: 4px; }
    .toolbar input, .toolbar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: .85rem; background: var(--white); }
    .toolbar-right { display: flex; gap: 8px; align-items: center; }

    /* ── Date toggle ── */
    .date-mode-toggle { display: flex; gap: 0; }
    .date-mode-btn { background: var(--white); border: 1px solid var(--border); padding: 6px 12px; cursor: pointer; font-size: .78rem; font-weight: 600; color: var(--gray); transition: background .15s, color .15s; }
    .date-mode-btn:first-child { border-radius: 6px 0 0 6px; }
    .date-mode-btn:last-child  { border-radius: 0 6px 6px 0; border-left: none; }
    .date-mode-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
    .date-range { display: flex; gap: 6px; align-items: flex-end; }

    /* ── View toggle ── */
    .view-toggle { display: flex; gap: 0; }
    .view-btn { background: var(--white); border: 1px solid var(--border); padding: 6px 11px; cursor: pointer; font-size: 1rem; color: var(--gray); transition: background .15s; line-height: 1; }
    .view-btn:first-child { border-radius: 6px 0 0 6px; }
    .view-btn:last-child  { border-radius: 0 6px 6px 0; border-left: none; }
    .view-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* ── Banner ── */
    .banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: var(--radius); padding: 10px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; font-size: .88rem; }
    .banner button { background: none; border: none; cursor: pointer; font-size: 1rem; color: var(--gray); }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: .72rem; font-weight: 600; text-transform: uppercase; }
    .badge-alta     { background: #fde8e8; color: var(--red); }
    .badge-normal   { background: var(--blue-bg); color: var(--blue); }
    .badge-baixa    { background: var(--gray-light); color: var(--gray); }
    .badge-concluida{ background: var(--green-bg); color: var(--green); }
    .badge-pendente { background: #fff8e1; color: #f57f17; }
    .badge-rolada   { background: var(--purple-bg); color: var(--purple); font-size: .68rem; }
    .badge-coordenador { background: #e8eaf6; color: #283593; }
    .badge-consultor   { background: #e0f2f1; color: #00695c; }

    /* ── Cards ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border-left: 4px solid var(--border); transition: box-shadow .15s; }
    .card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.13); }
    .card.concluida { opacity: .6; }
    .card.concluida .card-titulo { text-decoration: line-through; }
    .card.prioridade-alta   { border-left-color: var(--red); }
    .card.prioridade-normal { border-left-color: var(--blue); }
    .card.prioridade-baixa  { border-left-color: var(--gray); }
    .card.concluida         { border-left-color: var(--green-light) !important; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .card-titulo { font-weight: 600; font-size: .95rem; flex: 1; }
    .card-desc { font-size: .83rem; color: var(--gray); margin-bottom: 10px; line-height: 1.4; }
    .card-meta { font-size: .78rem; color: var(--gray); display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
    .card-meta span { display: flex; align-items: center; gap: 4px; }
    .card-actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* ── Lista ── */
    .list-view { display: flex; flex-direction: column; gap: 6px; }
    .list-item { background: var(--white); border-radius: var(--radius); padding: 12px 16px; box-shadow: var(--shadow); border-left: 4px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background .1s; }
    .list-item:hover { background: #f7fdf7; }
    .list-item.concluida { opacity: .6; border-left-color: var(--green-light) !important; }
    .list-item.prioridade-alta   { border-left-color: var(--red); }
    .list-item.prioridade-normal { border-left-color: var(--blue); }
    .list-item.prioridade-baixa  { border-left-color: var(--gray); }
    .list-item-main { flex: 1; min-width: 0; }
    .list-item-titulo { font-weight: 600; font-size: .92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item.concluida .list-item-titulo { text-decoration: line-through; }
    .list-item-sub { font-size: .78rem; color: var(--gray); display: flex; gap: 12px; margin-top: 3px; flex-wrap: wrap; }
    .list-item-badges { display: flex; gap: 4px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
    .list-item-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* ── Botões ── */
    .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: .88rem; font-weight: 600; transition: background .15s; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: #1b5e20; }
    .btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--gray-light); }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: .78rem; color: var(--gray); transition: background .15s; }
    .btn-icon:hover { background: var(--gray-light); }
    .btn-icon.concluir { color: var(--green); border-color: var(--green-light); }
    .btn-icon.concluir:hover { background: var(--green-bg); }
    .btn-icon.reabrir { color: var(--blue); border-color: var(--blue-light); }
    .btn-icon.reabrir:hover { background: var(--blue-bg); }
    .btn-icon.excluir { color: var(--red); border-color: #ef9a9a; }
    .btn-icon.excluir:hover { background: #fde8e8; }

    /* ── Empty ── */
    .empty-state { text-align: center; color: var(--gray); padding: 48px 0; font-size: .95rem; grid-column: 1/-1; }
    .empty-state span { display: block; font-size: 2.5rem; margin-bottom: 8px; }

    /* ── Table ── */
    .table-wrap { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--gray-light); padding: 10px 16px; text-align: left; font-size: .78rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: .5px; }
    td { padding: 11px 16px; font-size: .88rem; border-top: 1px solid var(--border); }
    tr:hover td { background: #fafafa; }
    .td-actions { display: flex; gap: 6px; }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; }
    .modal { position: fixed; inset: 0; z-index: 300; display: flex; align-items: center; justify-content: center; pointer-events: none; padding: 16px; }
    .modal:not(.hidden) { pointer-events: all; }
    .modal-box { background: var(--white); border-radius: 12px; padding: 28px; width: 100%; max-width: 500px; box-shadow: 0 8px 30px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto; }
    .modal-box h2 { font-size: 1.1rem; margin-bottom: 20px; color: var(--green); }
    .modal-box label { display: flex; flex-direction: column; font-size: .8rem; font-weight: 600; color: var(--gray); gap: 5px; margin-bottom: 14px; }
    .modal-box input, .modal-box select, .modal-box textarea { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: .9rem; font-family: inherit; }
    .modal-box input:focus, .modal-box select:focus, .modal-box textarea:focus { outline: 2px solid var(--green-light); border-color: transparent; }
    .modal-box textarea { resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

    /* ── Modal Detalhe ── */
    .modal-detalhe-box { max-width: 540px; }
    .detalhe-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .detalhe-header-left { display: flex; gap: 4px; flex-wrap: wrap; }
    .detalhe-close { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--gray); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
    .detalhe-close:hover { background: var(--gray-light); }
    .detalhe-titulo { font-size: 1.2rem; font-weight: 700; margin: 12px 0 6px; color: #1a1a1a; }
    .detalhe-desc { font-size: .9rem; color: var(--gray); line-height: 1.6; margin-bottom: 16px; white-space: pre-wrap; }
    .detalhe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: var(--gray-light); border-radius: var(--radius); padding: 14px; }
    .detalhe-field { display: flex; flex-direction: column; gap: 3px; }
    .detalhe-label { font-size: .7rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: .4px; }
    .detalhe-value { font-size: .88rem; }

    @media (max-width: 640px) {
      .header-inner { flex-direction: column; height: auto; padding: 10px 0; gap: 8px; }
      .form-row, .detalhe-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>📋 Controle de Atividades</h1>
    <nav>
      <button class="tab-btn active" data-tab="atividades">Atividades</button>
      <button class="tab-btn" data-tab="pessoas">Pessoas</button>
      <button class="tab-btn" data-tab="clientes">Clientes</button>
    </nav>
  </div>
</header>

<!-- ══ ABA ATIVIDADES ══════════════════════════════════════ -->
<main id="tab-atividades" class="tab-content active">
  <div class="toolbar">
    <div class="toolbar-left">
      <!-- Modo data -->
      <label>Data
        <div class="date-mode-toggle">
          <button class="date-mode-btn active" id="btnDataUnica"   onclick="setDateMode('unica')">Dia</button>
          <button class="date-mode-btn"         id="btnDataPeriodo" onclick="setDateMode('periodo')">Período</button>
        </div>
      </label>
      <div id="dateUnica">
        <label>  <input type="date" id="filtroData"></label>
      </div>
      <div id="datePeriodo" class="hidden date-range">
        <label>De<input type="date" id="filtroDataDe"></label>
        <label>Até<input type="date" id="filtroDataAte"></label>
      </div>
      <!-- Filtros -->
      <label>Origem
        <select id="filtroOrigem">
          <option value="">Todas</option>
          <option value="minhas">Minhas</option>
          <option value="consultor">Por consultor</option>
        </select>
      </label>
      <label>Pessoa
        <select id="filtroPessoa"><option value="">Todas</option></select>
      </label>
      <label>Cliente
        <select id="filtroCliente"><option value="">Todos</option></select>
      </label>
      <label>Status
        <select id="filtroStatus">
          <option value="">Todos</option>
          <option value="pendente">Pendente</option>
          <option value="concluida">Concluída</option>
        </select>
      </label>
    </div>
    <div class="toolbar-right">
      <div class="view-toggle">
        <button class="view-btn active" id="btnCards" title="Cartões" onclick="setView('cards')">⊞</button>
        <button class="view-btn"        id="btnLista" title="Lista"   onclick="setView('lista')">☰</button>
      </div>
      <button class="btn btn-primary" onclick="abrirModalAtividade()">+ Nova Atividade</button>
    </div>
  </div>

  <div id="rolloverBanner" class="banner hidden">
    ⚠️ Atividades pendentes de dias anteriores foram movidas para hoje automaticamente.
    <button onclick="this.parentElement.classList.add('hidden')">✕</button>
  </div>

  <div id="listaAtividades" class="cards-grid"></div>
</main>

<!-- ══ ABA PESSOAS ═════════════════════════════════════════ -->
<main id="tab-pessoas" class="tab-content">
  <div class="toolbar">
    <div class="toolbar-left"></div>
    <button class="btn btn-primary" onclick="abrirModalPessoa()">+ Nova Pessoa</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nome</th><th>Tipo</th><th>E-mail</th><th>Telefone</th><th></th></tr></thead>
      <tbody id="tBodyPessoas"></tbody>
    </table>
  </div>
</main>

<!-- ══ ABA CLIENTES ════════════════════════════════════════ -->
<main id="tab-clientes" class="tab-content">
  <div class="toolbar">
    <div class="toolbar-left"></div>
    <button class="btn btn-primary" onclick="abrirModalCliente()">+ Novo Cliente</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nome / Razão Social</th><th>CNPJ / CPF</th><th>E-mail</th><th>Telefone</th><th></th></tr></thead>
      <tbody id="tBodyClientes"></tbody>
    </table>
  </div>
</main>

<!-- ══ MODAL ATIVIDADE ════════════════════════════════════ -->
<div id="modalAtividade" class="modal hidden">
  <div class="modal-box">
    <h2 id="modalAtividadeTitulo">Nova Atividade</h2>
    <form id="formAtividade">
      <input type="hidden" id="atividadeId">
      <label>Título *<input type="text" id="atividadeTitulo" required></label>
      <label>Descrição<textarea id="atividadeDescricao" rows="3"></textarea></label>
      <div class="form-row">
        <label>Data *<input type="date" id="atividadeData" required></label>
        <label>Prioridade
          <select id="atividadePrioridade">
            <option value="baixa">Baixa</option>
            <option value="normal" selected>Normal</option>
            <option value="alta">Alta</option>
          </select>
        </label>
      </div>
      <label>Responsável
        <select id="atividadePessoa"><option value="">— Sem responsável —</option></select>
      </label>
      <label>Cliente
        <select id="atividadeCliente"><option value="">— Sem cliente —</option></select>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="fecharModal('modalAtividade')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- ══ MODAL PESSOA ═══════════════════════════════════════ -->
<div id="modalPessoa" class="modal hidden">
  <div class="modal-box">
    <h2 id="modalPessoaTitulo">Nova Pessoa</h2>
    <form id="formPessoa">
      <input type="hidden" id="pessoaId">
      <label>Nome *<input type="text" id="pessoaNome" required></label>
      <label>Tipo *
        <select id="pessoaTipo" required>
          <option value="coordenador">Coordenador</option>
          <option value="consultor">Consultor</option>
        </select>
      </label>
      <label>E-mail<input type="email" id="pessoaEmail"></label>
      <label>Telefone<input type="tel" id="pessoaTelefone"></label>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="fecharModal('modalPessoa')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- ══ MODAL CLIENTE ══════════════════════════════════════ -->
<div id="modalCliente" class="modal hidden">
  <div class="modal-box">
    <h2 id="modalClienteTitulo">Novo Cliente</h2>
    <form id="formCliente">
      <input type="hidden" id="clienteId">
      <label>Nome / Razão Social *<input type="text" id="clienteNome" required></label>
      <label>CNPJ / CPF<input type="text" id="clienteCnpj"></label>
      <div class="form-row">
        <label>E-mail<input type="email" id="clienteEmail"></label>
        <label>Telefone<input type="tel" id="clienteTelefone"></label>
      </div>
      <label>Observação<textarea id="clienteObs" rows="2"></textarea></label>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="fecharModal('modalCliente')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- ══ MODAL DETALHE ══════════════════════════════════════ -->
<div id="modalDetalhe" class="modal hidden">
  <div class="modal-box modal-detalhe-box">
    <div class="detalhe-header">
      <div class="detalhe-header-left">
        <span id="detalheBadgePrioridade" class="badge"></span>
        <span id="detalheBadgeStatus"     class="badge" style="margin-left:2px"></span>
        <span id="detalheBadgeRolada"     class="badge badge-rolada hidden" style="margin-left:2px"></span>
      </div>
      <button class="detalhe-close" onclick="fecharModal('modalDetalhe')">✕</button>
    </div>
    <div class="detalhe-titulo" id="detalheTitulo"></div>
    <div class="detalhe-desc"   id="detalheDesc"></div>
    <div class="detalhe-grid">
      <div class="detalhe-field"><span class="detalhe-label">📅 Data</span><span class="detalhe-value" id="detalheData"></span></div>
      <div class="detalhe-field"><span class="detalhe-label">👤 Responsável</span><span class="detalhe-value" id="detalhePessoa"></span></div>
      <div class="detalhe-field"><span class="detalhe-label">🏢 Cliente</span><span class="detalhe-value" id="detalheCliente"></span></div>
      <div class="detalhe-field"><span class="detalhe-label">🕒 Criado em</span><span class="detalhe-value" id="detalheCriado"></span></div>
      <div class="detalhe-field hidden" id="detalheRoladaField"><span class="detalhe-label">↩ Data original</span><span class="detalhe-value" id="detalheOriginal"></span></div>
    </div>
    <div class="modal-actions" style="margin-top:20px">
      <button id="detalheBtnReabrir"  class="btn btn-ghost hidden" onclick="reabrirDetalhe()">↩ Reabrir</button>
      <button id="detalheBtnConcluir" class="btn btn-ghost" style="color:var(--green);border-color:var(--green-light)" onclick="concluirDetalhe()">✓ Concluir</button>
      <button class="btn btn-ghost" onclick="editarDetalhe()">✏️ Editar</button>
      <button class="btn btn-primary" onclick="fecharModal('modalDetalhe')">Fechar</button>
    </div>
  </div>
</div>

<div id="overlay" class="overlay hidden" onclick="fecharTodos()"></div>

<script>
// ══ Storage ══════════════════════════════════════════════════
function load() {
  return {
    pessoas:    JSON.parse(localStorage.getItem('ca_pessoas')    || '[]'),
    clientes:   JSON.parse(localStorage.getItem('ca_clientes')   || '[]'),
    atividades: JSON.parse(localStorage.getItem('ca_atividades') || '[]'),
  };
}
function save(db) {
  localStorage.setItem('ca_pessoas',    JSON.stringify(db.pessoas));
  localStorage.setItem('ca_clientes',   JSON.stringify(db.clientes));
  localStorage.setItem('ca_atividades', JSON.stringify(db.atividades));
}

// Migração: consultores antigos → pessoas
(function migrate() {
  const old = localStorage.getItem('ca_consultores');
  if (!old) return;
  const db = load();
  const antigos = JSON.parse(old);
  antigos.forEach(c => {
    if (!db.pessoas.find(p => p.id === c.id)) {
      db.pessoas.push({ id: c.id, nome: c.nome, tipo: 'consultor', email: c.email || '', telefone: c.telefone || '' });
    }
  });
  // migra consultorId → pessoaId nas atividades
  db.atividades.forEach(a => {
    if (a.consultorId && !a.pessoaId) { a.pessoaId = a.consultorId; delete a.consultorId; }
  });
  save(db);
  localStorage.removeItem('ca_consultores');
})();

// ══ Rollover ═════════════════════════════════════════════════
function rollover() {
  const db = load(), hoje = hojeStr();
  let changed = false;
  db.atividades.forEach(a => {
    if (a.status === 'pendente' && a.data < hoje) {
      a.dataOriginal = a.dataOriginal || a.data;
      a.data = hoje;
      changed = true;
    }
  });
  if (changed) { save(db); document.getElementById('rolloverBanner').classList.remove('hidden'); }
}
function hojeStr() { return new Date().toISOString().split('T')[0]; }

// ══ State ════════════════════════════════════════════════════
let viewMode = 'cards', dateMode = 'unica', detalheId = null;

// ══ Init ═════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const hoje = hojeStr();
  document.getElementById('filtroData').value    = hoje;
  document.getElementById('filtroDataDe').value  = hoje;
  document.getElementById('filtroDataAte').value = hoje;
  document.getElementById('atividadeData').value = hoje;
  rollover();
  bindTabs();
  bindFiltros();
  bindForms();
  popularSelects();
  aplicarFiltros();
});

// ══ Tabs ═════════════════════════════════════════════════════
function bindTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'pessoas')   renderPessoas();
      if (btn.dataset.tab === 'clientes')  renderClientes();
    });
  });
}

// ══ View / Date mode ═════════════════════════════════════════
function setView(mode) {
  viewMode = mode;
  document.getElementById('btnCards').classList.toggle('active', mode === 'cards');
  document.getElementById('btnLista').classList.toggle('active', mode === 'lista');
  aplicarFiltros();
}
function setDateMode(mode) {
  dateMode = mode;
  document.getElementById('btnDataUnica').classList.toggle('active',   mode === 'unica');
  document.getElementById('btnDataPeriodo').classList.toggle('active', mode === 'periodo');
  document.getElementById('dateUnica').classList.toggle('hidden',   mode !== 'unica');
  document.getElementById('datePeriodo').classList.toggle('hidden', mode !== 'periodo');
  aplicarFiltros();
}

// ══ Filtros ══════════════════════════════════════════════════
function bindFiltros() {
  ['filtroData','filtroDataDe','filtroDataAte','filtroOrigem','filtroPessoa','filtroCliente','filtroStatus']
    .forEach(id => document.getElementById(id).addEventListener('change', aplicarFiltros));
}

function aplicarFiltros() {
  const db     = load();
  const origem = document.getElementById('filtroOrigem').value;
  const pId    = document.getElementById('filtroPessoa').value;
  const cId    = document.getElementById('filtroCliente').value;
  const st     = document.getElementById('filtroStatus').value;
  let lista    = db.atividades;

  if (dateMode === 'unica') {
    const d = document.getElementById('filtroData').value;
    if (d) lista = lista.filter(a => a.data === d);
  } else {
    const de = document.getElementById('filtroDataDe').value;
    const ate = document.getElementById('filtroDataAte').value;
    if (de)  lista = lista.filter(a => a.data >= de);
    if (ate) lista = lista.filter(a => a.data <= ate);
  }

  if (origem === 'minhas') {
    lista = lista.filter(a => {
      if (!a.pessoaId) return true;
      const p = db.pessoas.find(x => x.id === a.pessoaId);
      return p && p.tipo === 'coordenador';
    });
  } else if (origem === 'consultor') {
    lista = lista.filter(a => {
      if (!a.pessoaId) return false;
      const p = db.pessoas.find(x => x.id === a.pessoaId);
      return p && p.tipo === 'consultor';
    });
  }

  if (pId) lista = lista.filter(a => a.pessoaId === pId);
  if (cId) lista = lista.filter(a => a.clienteId === cId);
  if (st)  lista = lista.filter(a => a.status === st);

  renderAtividades(lista, db.pessoas, db.clientes);
}

// ══ Selects ══════════════════════════════════════════════════
function popularSelects() {
  const db = load();
  // filtroPessoa
  populateSelect('filtroPessoa', db.pessoas, 'Todas', p => `${p.nome} (${p.tipo})`);
  // atividadePessoa
  populateSelect('atividadePessoa', db.pessoas, '— Sem responsável —', p => `${p.nome} (${p.tipo})`);
  // filtroCliente
  populateSelect('filtroCliente', db.clientes, 'Todos', c => c.nome);
  // atividadeCliente
  populateSelect('atividadeCliente', db.clientes, '— Sem cliente —', c => c.nome);
}

function populateSelect(selId, items, emptyLabel, labelFn) {
  const sel = document.getElementById(selId);
  const val = sel.value;
  sel.innerHTML = `<option value="">${emptyLabel}</option>`;
  items.forEach(item => {
    const o = document.createElement('option');
    o.value = item.id; o.textContent = labelFn(item);
    sel.appendChild(o);
  });
  sel.value = val;
}

// ══ Render Atividades ════════════════════════════════════════
function renderAtividades(lista, pessoas, clientes) {
  const el = document.getElementById('listaAtividades');
  if (!lista.length) {
    el.className = 'cards-grid';
    el.innerHTML = '<div class="empty-state"><span>📭</span>Nenhuma atividade encontrada.</div>';
    return;
  }
  const ord = { alta:0, normal:1, baixa:2 };
  lista.sort((a,b) => {
    if (a.status !== b.status) return a.status === 'pendente' ? -1 : 1;
    return (ord[a.prioridade]??1) - (ord[b.prioridade]??1);
  });

  if (viewMode === 'lista') {
    el.className = 'list-view';
    el.innerHTML = lista.map(a => {
      const p = pessoas.find(x => x.id === a.pessoaId);
      const c = clientes.find(x => x.id === a.clienteId);
      const acao = a.status === 'pendente'
        ? `<button class="btn-icon concluir" onclick="concluir('${a.id}')">✓</button>`
        : `<button class="btn-icon reabrir"  onclick="reabrir('${a.id}')">↩</button>`;
      const rolada = a.dataOriginal ? `<span class="badge badge-rolada">↩ ${fmtDate(a.dataOriginal)}</span>` : '';
      const tipoBadge = p ? `<span class="badge badge-${p.tipo}">${p.tipo}</span>` : '';
      return `<div class="list-item ${a.status} prioridade-${a.prioridade}" onclick="abrirDetalhe('${a.id}')">
        <div class="list-item-main">
          <div class="list-item-titulo">${esc(a.titulo)}</div>
          <div class="list-item-sub">
            <span>📅 ${fmtDate(a.data)}</span>
            <span>👤 ${esc(p ? p.nome : '—')}</span>
            ${c ? `<span>🏢 ${esc(c.nome)}</span>` : ''}
            ${a.descricao ? `<span style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.descricao)}</span>` : ''}
          </div>
        </div>
        <div class="list-item-badges">
          ${rolada} ${tipoBadge}
          <span class="badge badge-${a.prioridade}">${a.prioridade}</span>
          <span class="badge badge-${a.status}">${a.status}</span>
        </div>
        <div class="list-item-actions" onclick="event.stopPropagation()">
          ${acao}
          <button class="btn-icon" onclick="editarAtividade('${a.id}')">✏️</button>
          <button class="btn-icon excluir" onclick="excluirAtividade('${a.id}')">🗑</button>
        </div>
      </div>`;
    }).join('');
  } else {
    el.className = 'cards-grid';
    el.innerHTML = lista.map(a => {
      const p = pessoas.find(x => x.id === a.pessoaId);
      const c = clientes.find(x => x.id === a.clienteId);
      const rolada = a.dataOriginal ? `<span class="badge badge-rolada">↩ de ${fmtDate(a.dataOriginal)}</span> ` : '';
      const desc = a.descricao ? `<p class="card-desc">${esc(a.descricao)}</p>` : '';
      const tipoBadge = p ? ` <span class="badge badge-${p.tipo}">${p.tipo}</span>` : '';
      const acao = a.status === 'pendente'
        ? `<button class="btn-icon concluir" onclick="concluir('${a.id}')">✓ Concluir</button>`
        : `<button class="btn-icon reabrir"  onclick="reabrir('${a.id}')">↩ Reabrir</button>`;
      return `<div class="card ${a.status} prioridade-${a.prioridade}">
        <div class="card-header">
          <span class="card-titulo">${esc(a.titulo)}</span>
          <span class="badge badge-${a.prioridade}">${a.prioridade}</span>
        </div>
        ${desc}
        <div class="card-meta">
          <span>📅 ${fmtDate(a.data)}</span>
          <span>👤 ${esc(p ? p.nome : '—')}${tipoBadge}</span>
          ${c ? `<span>🏢 ${esc(c.nome)}</span>` : ''}
          <span>${rolada}<span class="badge badge-${a.status}">${a.status}</span></span>
        </div>
        <div class="card-actions">
          ${acao}
          <button class="btn-icon" onclick="editarAtividade('${a.id}')">✏️ Editar</button>
          <button class="btn-icon excluir" onclick="excluirAtividade('${a.id}')">🗑</button>
        </div>
      </div>`;
    }).join('');
  }
}

// ══ Render Pessoas ════════════════════════════════════════════
function renderPessoas() {
  const db = load();
  const tb = document.getElementById('tBodyPessoas');
  if (!db.pessoas.length) {
    tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:32px">Nenhuma pessoa cadastrada.</td></tr>';
    return;
  }
  tb.innerHTML = db.pessoas.map(p => `<tr>
    <td>${esc(p.nome)}</td>
    <td><span class="badge badge-${p.tipo}">${p.tipo}</span></td>
    <td>${esc(p.email)}</td>
    <td>${esc(p.telefone)}</td>
    <td><div class="td-actions">
      <button class="btn-icon" onclick="editarPessoa('${p.id}')">✏️ Editar</button>
      <button class="btn-icon excluir" onclick="excluirPessoa('${p.id}')">🗑</button>
    </div></td>
  </tr>`).join('');
}

    </div></td>
  </tr>`).join('');
}

// ══ Ações Atividades ══════════════════════════════════════════
function concluir(id) {
  const db = load(); const a = db.atividades.find(x => x.id === id);
  if (a) { a.status = 'concluida'; save(db); aplicarFiltros(); }
}
function reabrir(id) {
  const db = load(); const a = db.atividades.find(x => x.id === id);
  if (a) { a.status = 'pendente'; save(db); aplicarFiltros(); }
}
function excluirAtividade(id) {
  if (!confirm('Excluir esta atividade?')) return;
  const db = load();
  db.atividades = db.atividades.filter(x => x.id !== id);
  save(db); aplicarFiltros();
}
function editarAtividade(id) {
  const db = load(); const a = db.atividades.find(x => x.id === id);
  if (!a) return;
  document.getElementById('atividadeId').value          = a.id;
  document.getElementById('atividadeTitulo').value      = a.titulo;
  document.getElementById('atividadeDescricao').value   = a.descricao;
  document.getElementById('atividadeData').value        = a.data;
  document.getElementById('atividadePrioridade').value  = a.prioridade;
  document.getElementById('atividadePessoa').value      = a.pessoaId || '';
  document.getElementById('atividadeCliente').value     = a.clienteId || '';
  document.getElementById('modalAtividadeTitulo').textContent = 'Editar Atividade';
  abrirModal('modalAtividade');
}

// ══ Ações Pessoas ════════════════════════════════════════════
function excluirPessoa(id) {
  if (!confirm('Excluir esta pessoa?')) return;
  const db = load();
  db.pessoas = db.pessoas.filter(x => x.id !== id);

}

  document.getElementById('modalPessoaTitulo').textContent = 'Editar Pessoa';

}

// ══ Modal Detalhe ════════════════════════════════════════════
function abrirDetalhe(id) {
  const db = load(); const a = db.atividades.find(x => x.id === id);
  if (!a) return;
  detalheId = id;
  const p = db.pessoas.find(x => x.id === a.pessoaId);
  const c = db.clientes.find(x => x.id === a.clienteId);
  document.getElementById('detalheTitulo').textContent = a.titulo;
  document.getElementById('detalheDesc').textContent   = a.descricao || '';
  document.getElementById('detalheData').textContent   = fmtDate(a.data);
  document.getElementById('detalhePessoa').innerHTML   = p ? `${esc(p.nome)} <span class="badge badge-${p.tipo}">${p.tipo}</span>` : '—';
  document.getElementById('detalheCliente').textContent = c ? c.nome : '—';
  document.getElementById('detalheCriado').textContent  = a.criadoEm ? fmtDateTime(a.criadoEm) : '—';

  const bp = document.getElementById('detalheBadgePrioridade');
  bp.textContent = a.prioridade; bp.className = `badge badge-${a.prioridade}`;
  const bs = document.getElementById('detalheBadgeStatus');
  bs.textContent = a.status; bs.className = `badge badge-${a.status}`;

  const br = document.getElementById('detalheBadgeRolada');
  if (a.dataOriginal) {
    br.textContent = `↩ Rolada de ${fmtDate(a.dataOriginal)}`; br.classList.remove('hidden');
    document.getElementById('detalheOriginal').textContent = fmtDate(a.dataOriginal);
    document.getElementById('detalheRoladaField').classList.remove('hidden');
  } else {
    br.classList.add('hidden');
    document.getElementById('detalheRoladaField').classList.add('hidden');
  }

  document.getElementById('detalheBtnConcluir').classList.toggle('hidden', a.status === 'concluida');
  document.getElementById('detalheBtnReabrir').classList.toggle('hidden',  a.status === 'pendente');
  abrirModal('modalDetalhe');
}
function concluirDetalhe() { if (detalheId) { concluir(detalheId); fecharModal('modalDetalhe'); } }
function reabrirDetalhe()  { if (detalheId) { reabrir(detalheId);  fecharModal('modalDetalhe'); } }
function editarDetalhe()   { fecharModal('modalDetalhe'); editarAtividade(detalheId); }

// ══ Forms ════════════════════════════════════════════════════
function bindForms() {
  // Atividade
  document.getElementById('formAtividade').addEventListener('submit', e => {
    e.preventDefault();
    const db = load(), id = document.getElementById('atividadeId').value;
    const payload = {
      titulo:     document.getElementById('atividadeTitulo').value,
      descricao:  document.getElementById('atividadeDescricao').value,
      data:       document.getElementById('atividadeData').value,
      prioridade: document.getElementById('atividadePrioridade').value,
      pessoaId:   document.getElementById('atividadePessoa').value || null,
      clienteId:  document.getElementById('atividadeCliente').value || null,
    };
    if (id) {
      const idx = db.atividades.findIndex(x => x.id === id);
      db.atividades[idx] = { ...db.atividades[idx], ...payload };
    } else {
      db.atividades.push({ id: Date.now().toString(), status: 'pendente', dataOriginal: null, criadoEm: new Date().toISOString(), ...payload });
    }
    save(db); fecharModal('modalAtividade'); aplicarFiltros();
  });

  // Pessoa
  document.getElementById('formPessoa').addEventListener('submit', e => {
    e.preventDefault();
    const db = load(), id = document.getElementById('pessoaId').value;
    const payload = {
      nome:     document.getElementById('pessoaNome').value,
      tipo:     document.getElementById('pessoaTipo').value,
      email:    document.getElementById('pessoaEmail').value,
      telefone: document.getElementById('pessoaTelefone').value,
    };
    if (id) {
      const idx = db.pessoas.findIndex(x => x.id === id);
      db.pessoas[idx] = { ...db.pessoas[idx], ...payload };
    } else {
      db.pessoas.push({ id: Date.now().toString(), ...payload });
    }
    save(db); fecharModal('modalPessoa'); popularSelects(); renderPessoas();
  });

  // Cliente
  document.getElementById('formCliente').addEventListener('submit', e => {
    e.preventDefault();
    const db = load(), id = document.getElementById('clienteId').value;
    const payload = {
      nome:     document.getElementById('clienteNome').value,
      cnpj:     document.getElementById('clienteCnpj').value,
      email:    document.getElementById('clienteEmail').value,
      telefone: document.getElementById('clienteTelefone').value,
      obs:      document.getElementById('clienteObs').value,
    };
    if (id) {
      const idx = db.clientes.findIndex(x => x.id === id);
      db.clientes[idx] = { ...db.clientes[idx], ...payload };
    } else {
      db.clientes.push({ id: Date.now().toString(), ...payload });
    }
    save(db); fecharModal('modalCliente'); popularSelects(); renderClientes();
  });
}

// ══ Abrir modais ══════════════════════════════════════════════

function abrirModal(id) {
  document.getElementById(id).classList.remove('hidden');
  document.getElementById('overlay').classList.remove('hidden');
}
function fecharModal(id) {
  document.getElementById(id).classList.add('hidden');
  document.getElementById('overlay').classList.add('hidden');
}
function fecharTodos() {
  ['modalAtividade','modalPessoa','modalCliente','modalDetalhe'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));
  document.getElementById('overlay').classList.add('hidden');
}

// ══ Helpers ══════════════════════════════════════════════════
function fmtDate(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  const dt = new Date(iso);
  return dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
